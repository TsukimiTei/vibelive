<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" shape-rendering="crispEdges">
  <!-- Pixel chat bubble with people -->
  <!-- Chat bubble outline -->
  <rect x="4" y="2" width="2" height="2" fill="#9B59B6"/>
  <rect x="6" y="2" width="2" height="2" fill="#9B59B6"/>
  <rect x="8" y="2" width="2" height="2" fill="#9B59B6"/>
  <rect x="10" y="2" width="2" height="2" fill="#9B59B6"/>
  <rect x="12" y="2" width="2" height="2" fill="#9B59B6"/>
  <rect x="14" y="2" width="2" height="2" fill="#9B59B6"/>
  <rect x="16" y="2" width="2" height="2" fill="#9B59B6"/>
  <rect x="18" y="2" width="2" height="2" fill="#9B59B6"/>
  <rect x="2" y="4" width="2" height="2" fill="#9B59B6"/>
  <rect x="20" y="4" width="2" height="2" fill="#9B59B6"/>
  <rect x="2" y="6" width="2" height="2" fill="#9B59B6"/>
  <rect x="20" y="6" width="2" height="2" fill="#9B59B6"/>
  <rect x="2" y="8" width="2" height="2" fill="#9B59B6"/>
  <rect x="20" y="8" width="2" height="2" fill="#9B59B6"/>
  <rect x="2" y="10" width="2" height="2" fill="#9B59B6"/>
  <rect x="20" y="10" width="2" height="2" fill="#9B59B6"/>
  <rect x="2" y="12" width="2" height="2" fill="#9B59B6"/>
  <rect x="20" y="12" width="2" height="2" fill="#9B59B6"/>
  <!-- Bottom -->
  <rect x="4" y="14" width="2" height="2" fill="#9B59B6"/>
  <rect x="6" y="14" width="2" height="2" fill="#9B59B6"/>
  <rect x="8" y="14" width="2" height="2" fill="#9B59B6"/>
  <rect x="10" y="14" width="2" height="2" fill="#9B59B6"/>
  <rect x="12" y="14" width="2" height="2" fill="#9B59B6"/>
  <rect x="14" y="14" width="2" height="2" fill="#9B59B6"/>
  <rect x="16" y="14" width="2" height="2" fill="#9B59B6"/>
  <rect x="18" y="14" width="2" height="2" fill="#9B59B6"/>
  <!-- Tail -->
  <rect x="6" y="16" width="2" height="2" fill="#9B59B6"/>
  <rect x="4" y="18" width="2" height="2" fill="#9B59B6"/>
  <!-- Interior fill -->
  <rect x="4" y="4" width="16" height="10" fill="#C39BD3" opacity="0.25"/>
  <!-- Two pixel people inside -->
  <!-- Person 1 head -->
  <rect x="7" y="5" width="2" height="2" fill="#FFFFFF"/>
  <!-- Person 1 body -->
  <rect x="6" y="7" width="2" height="2" fill="#FFFFFF"/>
  <rect x="8" y="7" width="2" height="2" fill="#FFFFFF"/>
  <rect x="7" y="9" width="2" height="2" fill="#FFFFFF"/>
  <!-- Person 2 head -->
  <rect x="14" y="5" width="2" height="2" fill="#FFFFFF"/>
  <!-- Person 2 body -->
  <rect x="13" y="7" width="2" height="2" fill="#FFFFFF"/>
  <rect x="15" y="7" width="2" height="2" fill="#FFFFFF"/>
  <rect x="14" y="9" width="2" height="2" fill="#FFFFFF"/>
  <!-- Connection dots -->
  <rect x="11" y="7" width="2" height="2" fill="#FFFFFF" opacity="0.6"/>
</svg>