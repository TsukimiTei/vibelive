<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" shape-rendering="crispEdges">
  <!-- Pixel megaphone/bullhorn -->
  <!-- Handle -->
  <rect x="2" y="10" width="2" height="2" fill="#CC5555"/>
  <rect x="2" y="12" width="2" height="2" fill="#CC5555"/>
  <!-- Body back -->
  <rect x="4" y="8" width="2" height="2" fill="#FF6B6B"/>
  <rect x="4" y="10" width="2" height="2" fill="#FF6B6B"/>
  <rect x="4" y="12" width="2" height="2" fill="#FF6B6B"/>
  <rect x="4" y="14" width="2" height="2" fill="#FF6B6B"/>
  <!-- Body middle -->
  <rect x="6" y="6" width="2" height="2" fill="#FF6B6B"/>
  <rect x="6" y="8" width="2" height="2" fill="#FF6B6B"/>
  <rect x="6" y="10" width="2" height="2" fill="#FF6B6B"/>
  <rect x="6" y="12" width="2" height="2" fill="#FF6B6B"/>
  <rect x="6" y="14" width="2" height="2" fill="#FF6B6B"/>
  <rect x="6" y="16" width="2" height="2" fill="#FF6B6B"/>
  <!-- Body front -->
  <rect x="8" y="4" width="2" height="2" fill="#FF6B6B"/>
  <rect x="8" y="6" width="2" height="2" fill="#FF8888"/>
  <rect x="8" y="8" width="2" height="2" fill="#FF8888"/>
  <rect x="8" y="10" width="2" height="2" fill="#FF8888"/>
  <rect x="8" y="12" width="2" height="2" fill="#FF8888"/>
  <rect x="8" y="14" width="2" height="2" fill="#FF8888"/>
  <rect x="8" y="16" width="2" height="2" fill="#FF8888"/>
  <rect x="8" y="18" width="2" height="2" fill="#FF6B6B"/>
  <!-- Bell opening -->
  <rect x="10" y="4" width="2" height="2" fill="#FF6B6B"/>
  <rect x="10" y="18" width="2" height="2" fill="#FF6B6B"/>
  <rect x="10" y="6" width="2" height="12" fill="#FF8888" opacity="0.3"/>
  <!-- Sound waves -->
  <rect x="14" y="8" width="2" height="2" fill="#FF6B6B" opacity="0.8"/>
  <rect x="14" y="14" width="2" height="2" fill="#FF6B6B" opacity="0.8"/>
  <rect x="16" y="6" width="2" height="2" fill="#FF6B6B" opacity="0.6"/>
  <rect x="16" y="10" width="2" height="2" fill="#FF6B6B" opacity="0.6"/>
  <rect x="16" y="16" width="2" height="2" fill="#FF6B6B" opacity="0.6"/>
  <rect x="18" y="4" width="2" height="2" fill="#FF6B6B" opacity="0.4"/>
  <rect x="18" y="10" width="2" height="2" fill="#FF6B6B" opacity="0.4"/>
  <rect x="18" y="18" width="2" height="2" fill="#FF6B6B" opacity="0.4"/>
  <rect x="20" y="8" width="2" height="2" fill="#FF6B6B" opacity="0.3"/>
  <rect x="20" y="14" width="2" height="2" fill="#FF6B6B" opacity="0.3"/>
</svg>