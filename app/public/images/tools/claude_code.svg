<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" shape-rendering="crispEdges">
  <!-- Pixel terminal with sparkle for Claude Code -->
  <!-- Terminal window -->
  <rect x="2" y="4" width="20" height="2" fill="#D97706"/>
  <rect x="2" y="4" width="2" height="16" fill="#D97706"/>
  <rect x="20" y="4" width="2" height="16" fill="#D97706"/>
  <rect x="2" y="18" width="20" height="2" fill="#D97706"/>
  <!-- Title bar accent -->
  <rect x="4" y="5" width="1" height="1" fill="#EF4444"/>
  <rect x="6" y="5" width="1" height="1" fill="#FBBF24"/>
  <rect x="8" y="5" width="1" height="1" fill="#34D399"/>
  <!-- Dark interior -->
  <rect x="4" y="6" width="16" height="12" fill="#1A1A2E"/>
  <!-- Terminal prompt > _ -->
  <rect x="5" y="8" width="2" height="2" fill="#D97706"/>
  <rect x="7" y="10" width="2" height="2" fill="#D97706"/>
  <rect x="5" y="12" width="2" height="2" fill="#D97706"/>
  <!-- Cursor -->
  <rect x="10" y="10" width="2" height="2" fill="#FBBF24"/>
  <!-- Code text lines -->
  <rect x="13" y="8" width="4" height="1" fill="#D97706" opacity="0.5"/>
  <rect x="13" y="11" width="6" height="1" fill="#D97706" opacity="0.5"/>
  <rect x="13" y="14" width="3" height="1" fill="#D97706" opacity="0.5"/>
  <!-- Sparkle top-right -->
  <rect x="18" y="0" width="2" height="2" fill="#FBBF24"/>
  <rect x="16" y="2" width="2" height="2" fill="#FDE68A"/>
  <rect x="20" y="2" width="2" height="2" fill="#FDE68A"/>
  <rect x="18" y="2" width="2" height="2" fill="#FFFFFF"/>
  <rect x="18" y="4" width="2" height="2" fill="#FDE68A"/>
  <!-- Small sparkle -->
  <rect x="22" y="0" width="2" height="2" fill="#FDE68A"/>
</svg>