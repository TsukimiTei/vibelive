<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" shape-rendering="crispEdges">
  <!-- Pixel terminal/code brackets for Replit -->
  <!-- Outer frame -->
  <rect x="2" y="2" width="20" height="2" fill="#F26207"/>
  <rect x="2" y="20" width="20" height="2" fill="#F26207"/>
  <rect x="2" y="2" width="2" height="20" fill="#F26207"/>
  <rect x="20" y="2" width="2" height="20" fill="#F26207"/>
  <!-- Inner dark fill -->
  <rect x="4" y="4" width="16" height="16" fill="#1C1C1C"/>
  <!-- Left bracket { -->
  <rect x="7" y="5" width="2" height="2" fill="#F26207"/>
  <rect x="5" y="7" width="2" height="2" fill="#F26207"/>
  <rect x="5" y="9" width="2" height="2" fill="#F26207"/>
  <rect x="5" y="11" width="2" height="2" fill="#F26207"/>
  <rect x="5" y="13" width="2" height="2" fill="#F26207"/>
  <rect x="7" y="15" width="2" height="2" fill="#F26207"/>
  <!-- Dot -->
  <rect x="11" y="10" width="2" height="2" fill="#FF8C42"/>
  <!-- Right bracket } -->
  <rect x="15" y="5" width="2" height="2" fill="#F26207"/>
  <rect x="17" y="7" width="2" height="2" fill="#F26207"/>
  <rect x="17" y="9" width="2" height="2" fill="#F26207"/>
  <rect x="17" y="11" width="2" height="2" fill="#F26207"/>
  <rect x="17" y="13" width="2" height="2" fill="#F26207"/>
  <rect x="15" y="15" width="2" height="2" fill="#F26207"/>
  <!-- Underline cursor -->
  <rect x="9" y="18" width="6" height="1" fill="#F26207" opacity="0.7"/>
</svg>